name: Deploy to Google Cloud Functions

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  FUNCTION_NAME: probotApp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Google Cloud Functions
        uses: google-github-actions/deploy-cloud-functions@v2.1.0
        with:
          name: ${{ env.FUNCTION_NAME }}
          runtime: nodejs22
          entry_point: probotApp
          region: ${{ env.REGION }}
          source_dir: .
          env_vars: |
            APP_ID=${{ secrets.APP_ID }}
            PRIVATE_KEY_BASE64=${{ secrets.PRIVATE_KEY_BASE64 }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            CLASSROOM_TOKEN=${{ secrets.CLASSROOM_TOKEN }}
            PR_AGENT_BOT_USER=${{ secrets.PR_AGENT_BOT_USER }} 
